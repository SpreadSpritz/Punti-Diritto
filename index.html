<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punti Diritto / Right Points</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-thick: rgba(255, 255, 255, 0.15);
            --blur: blur(25px);
            --border: rgba(255, 255, 255, 0.15);
            --red: #ff3b30;
            --green: #34c759;
            --blue: #0a84ff;
            --bg: #000000;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg); color: white;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, #1c1c1e 0%, #000 60%); z-index: -1;
        }

        header {
            padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-bottom: 0.5px solid var(--border);
        }

        h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

        .lang-btn {
            background: var(--glass-thick); border: 1px solid var(--border); color: white;
            padding: 8px 14px; border-radius: 12px; font-size: 13px; cursor: pointer;
        }

        .scroll-area {
            flex: 1; overflow-y: auto; padding: 15px 15px 120px;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .glass-card {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px;
        }

        .card-header {
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.5); margin-bottom: 15px; display: flex; justify-content: space-between;
        }

        .user-row { display: flex; justify-content: space-between; align-items: center; }
        .user-info span { font-size: 19px; font-weight: 600; }
        .btn-edit-small { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 16px; }

        .points-display { font-size: 30px; font-weight: 800; text-align: right; min-width: 90px; }
        .negative { color: var(--red); font-size: 15px; }

        .controls { display: flex; gap: 10px; margin-left: 15px; }
        .controls button {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            font-size: 22px; color: white; cursor: pointer; font-weight: bold;
        }
        .btn-minus { background-color: var(--red); }
        .btn-plus { background-color: var(--green); }

        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(15px);
        }

        .modal {
            background: #1c1c1e; width: 85%; max-width: 340px; padding: 30px;
            border-radius: 30px; text-align: center; border: 1px solid var(--border);
        }

        input {
            width: 100%; padding: 14px; margin: 8px 0; box-sizing: border-box;
            border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px;
        }

        .primary-btn {
            background: var(--blue); color: white; width: 100%; padding: 15px;
            border-radius: 14px; border: none; font-weight: 700; font-size: 16px; margin-top: 10px; cursor: pointer;
        }

        .secondary-btn {
            background: none; color: var(--blue); border: none; margin-top: 15px; cursor: pointer; font-size: 14px;
        }

        .delete-btn { color: var(--red); background: none; border: none; margin-top: 10px; cursor: pointer; width: 100%; }

        .add-btn-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 16px 35px; border-radius: 40px;
            font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="ui-app-title">Punti Diritto</h1>
        <button class="lang-btn" onclick="toggleLang()">IT / EN</button>
    </header>

    <div class="scroll-area" id="main-content">
        <!-- Mio Account -->
        <div id="my-card" class="glass-card" style="display:none;">
            <div class="card-header" id="ui-my-stats">Le tue statistiche</div>
            <div class="user-row">
                <div class="user-info"><span id="my-name-display">...</span></div>
                <div class="points-display" id="my-points">100</div>
                <div class="controls">
                    <button class="btn-minus" onclick="openPointsModal('me', 'minus')">-</button>
                </div>
            </div>
            <button class="secondary-btn" onclick="logout()" id="ui-logout">Esci</button>
        </div>

        <div id="others-list"></div>
    </div>

    <button class="add-btn-fixed" onclick="openAddModal()" id="ui-add-person-btn">+ Aggiungi Persona</button>

    <!-- MODALE AUTH -->
    <div id="modal-auth" class="overlay" style="display: flex;">
        <div class="modal">
            <h2 id="auth-title">Accedi</h2>
            <input type="text" id="auth-user" placeholder="Nome utente">
            <input type="password" id="auth-pass" placeholder="Password">
            <p id="auth-error" style="color:var(--red); font-size:12px; display:none; margin: 10px 0;"></p>
            <button class="primary-btn" id="auth-submit-btn" onclick="handleAuth()">Accedi</button>
            <button class="secondary-btn" id="auth-toggle-btn" onclick="toggleAuthMode()">Non hai un account? Registrati</button>
        </div>
    </div>

    <!-- MODALI AGGIUNGI / MODIFICA / PUNTI -->
    <div id="modal-add" class="overlay">
        <div class="modal">
            <h3 id="ui-add-title">Aggiungi Persona</h3>
            <input type="text" id="add-acc-input" placeholder="Nome account esatto">
            <input type="text" id="add-disp-input" placeholder="Nome visualizzato">
            <button class="primary-btn" onclick="addNewFriend()" id="ui-save-add">Salva</button>
        </div>
    </div>

    <div id="modal-edit" class="overlay">
        <div class="modal">
            <h3 id="ui-edit-title">Modifica Persona</h3>
            <input type="text" id="edit-disp-input" placeholder="Nome visualizzato">
            <button class="primary-btn" onclick="confirmEdit()" id="ui-save-edit">Salva</button>
            <button class="delete-btn" onclick="deleteFriend()" id="ui-delete-btn">Rimuovi</button>
        </div>
    </div>

    <div id="modal-points" class="overlay">
        <div class="modal">
            <h3 id="ui-points-title">Quanti punti?</h3>
            <input type="number" id="points-val" value="1" min="1" max="50">
            <button class="primary-btn" onclick="submitPointsChange()" id="ui-confirm-pts">Conferma</button>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // --- INSERISCI QUI I TUOI DATI FIREBASE ---
        const firebaseConfig = {
        apiKey: "AIzaSyDiEPIuYsuH-exYrCu4Sw1OigAJ2iZb_0c",
        authDomain: "punti-diritto.firebaseapp.com",
        databaseURL: "https://punti-diritto-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "punti-diritto",
        storageBucket: "punti-diritto.firebasestorage.app",
        messagingSenderId: "718743082670",
        appId: "1:718743082670:web:d8c182b4ac46b5b8783f3f",
        measurementId: "G-VWCMYL16ZJ"
      };

        // Inizializzazione protetta
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) {
            alert("Errore configurazione Firebase: " + e.message);
        }

        let lang = localStorage.getItem('rp_lang') || 'it';
        let myAcc = localStorage.getItem('rp_myacc');
        let friends = JSON.parse(localStorage.getItem('rp_friends') || '[]');
        let isSignup = false;
        let activeTarget, activeType, editingAcc;

        const translations = {
            it: {
                appTitle: "Punti Diritto", myStats: "Le tue statistiche", addBtn: "+ Aggiungi Persona",
                neg: "In Negativo", login: "Accedi", signup: "Registrati",
                userPlaceholder: "Nome utente", passPlaceholder: "Password",
                toggleToSignup: "Non hai un account? Registrati", toggleToLogin: "Hai già un account? Accedi",
                errorExists: "Nome già occupato!", errorWrong: "Nome o password errati!",
                errorDb: "Errore Database! Controlla le regole su Firebase.",
                addT: "Aggiungi Persona", editT: "Modifica Persona", ptsT: "Quanti punti?",
                accExact: "Nome account esatto", dispPlaceholder: "Nome visualizzato",
                save: "Salva", confirm: "Conferma", remove: "Rimuovi dalla lista", logout: "Esci"
            },
            en: {
                appTitle: "Right Points", myStats: "Your Stats", addBtn: "+ Add Person",
                neg: "In Negative", login: "Login", signup: "Sign Up",
                userPlaceholder: "Username", passPlaceholder: "Password",
                toggleToSignup: "No account? Sign up", toggleToLogin: "Have an account? Login",
                errorExists: "Name already taken!", errorWrong: "Wrong name or password!",
                errorDb: "Database Error! Check Firebase Rules.",
                addT: "Add Person", editT: "Edit Person", ptsT: "How many points?",
                accExact: "Exact account name", dispPlaceholder: "Display name",
                save: "Save", confirm: "Confirm", remove: "Remove from list", logout: "Logout"
            }
        };

        function updateUI() {
            const t = translations[lang];
            document.getElementById('ui-app-title').innerText = t.appTitle;
            document.getElementById('ui-my-stats').innerText = t.myStats;
            document.getElementById('ui-add-person-btn').innerText = t.addBtn;
            document.getElementById('auth-title').innerText = isSignup ? t.signup : t.login;
            document.getElementById('auth-submit-btn').innerText = isSignup ? t.signup : t.login;
            document.getElementById('auth-toggle-btn').innerText = isSignup ? t.toggleToLogin : t.toggleToSignup;
            
            // Placeholder dinamici
            document.getElementById('auth-user').placeholder = t.userPlaceholder;
            document.getElementById('auth-pass').placeholder = t.passPlaceholder;
            document.getElementById('add-acc-input').placeholder = t.accExact;
            document.getElementById('add-disp-input').placeholder = t.dispPlaceholder;
            document.getElementById('edit-disp-input').placeholder = t.dispPlaceholder;

            document.getElementById('ui-add-title').innerText = t.addT;
            document.getElementById('ui-save-add').innerText = t.save;
            document.getElementById('ui-edit-title').innerText = t.editT;
            document.getElementById('ui-save-edit').innerText = t.save;
            document.getElementById('ui-delete-btn').innerText = t.remove;
            document.getElementById('ui-points-title').innerText = t.ptsT;
            document.getElementById('ui-confirm-pts').innerText = t.confirm;
            document.getElementById('ui-logout').innerText = t.logout;
            renderFriends();
        }

        function toggleLang() {
            lang = lang === 'it' ? 'en' : 'it';
            localStorage.setItem('rp_lang', lang);
            updateUI();
        }

        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('auth-error').style.display = 'none';
            updateUI();
        }

        async function handleAuth() {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value.trim();
            const errEl = document.getElementById('auth-error');
            
            if (!user || !pass) return;
            errEl.style.display = 'none';

            try {
                const snap = await db.ref('users/' + user).once('value');
                
                if (isSignup) {
                    if (snap.exists()) {
                        errEl.innerText = translations[lang].errorExists;
                        errEl.style.display = 'block';
                    } else {
                        await db.ref('users/' + user).set({
                            pass: pass,
                            points: 100,
                            lastReset: new Date().toDateString()
                        });
                        loginSuccess(user);
                    }
                } else {
                    if (snap.exists() && snap.val().pass === pass) {
                        loginSuccess(user);
                    } else {
                        errEl.innerText = translations[lang].errorWrong;
                        errEl.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error(e);
                errEl.innerText = translations[lang].errorDb;
                errEl.style.display = 'block';
            }
        }

        function loginSuccess(user) {
            myAcc = user;
            localStorage.setItem('rp_myacc', user);
            document.getElementById('modal-auth').style.display = 'none';
            document.getElementById('my-card').style.display = 'block';
            startApp();
        }

        function logout() {
            localStorage.removeItem('rp_myacc');
            location.reload();
        }

        if (myAcc) {
            document.getElementById('modal-auth').style.display = 'none';
            document.getElementById('my-card').style.display = 'block';
            startApp();
        } else {
            updateUI();
        }

        function startApp() {
            document.getElementById('my-name-display').innerText = myAcc;
            db.ref('users/' + myAcc).on('value', snap => {
                const data = snap.val();
                if (data) {
                    const today = new Date().toDateString();
                    if (data.lastReset !== today) {
                        db.ref('users/' + myAcc).update({
                            points: data.points < 0 ? 75 : 100,
                            lastReset: today
                        });
                    }
                    displayPoints('my-points', data.points);
                }
            });
            updateUI();
        }

        function displayPoints(id, val) {
            const el = document.getElementById(id);
            if (!el) return;
            if (val < 0) {
                el.innerText = translations[lang].neg;
                el.className = "points-display negative";
            } else {
                el.innerText = val;
                el.className = "points-display";
            }
        }

        function renderFriends() {
            const list = document.getElementById('others-list');
            list.innerHTML = '';
            friends.forEach(f => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div class="card-header">Account: @${f.acc} <button class="btn-edit-small" onclick="openEditModal('${f.acc}', '${f.disp}')">✏️</button></div>
                    <div class="user-row">
                        <div class="user-info"><span>${f.disp}</span></div>
                        <div class="points-display" id="pts-${f.acc}">...</div>
                        <div class="controls">
                            <button class="btn-minus" onclick="openPointsModal('${f.acc}', 'minus')">-</button>
                            <button class="btn-plus" onclick="openPointsModal('${f.acc}', 'plus')">+</button>
                        </div>
                    </div>`;
                list.appendChild(card);
                db.ref('users/' + f.acc).on('value', snap => {
                    if (snap.exists()) displayPoints('pts-' + f.acc, snap.val().points);
                });
            });
        }

        function openAddModal() { document.getElementById('modal-add').style.display = 'flex'; }
        function addNewFriend() {
            const acc = document.getElementById('add-acc-input').value.trim().toLowerCase();
            const disp = document.getElementById('add-disp-input').value.trim();
            if (acc && acc !== myAcc && !friends.find(f => f.acc === acc)) {
                friends.push({ acc, disp: disp || acc });
                localStorage.setItem('rp_friends', JSON.stringify(friends));
                renderFriends();
            }
            document.getElementById('modal-add').style.display = 'none';
        }

        function openEditModal(acc, disp) {
            editingAcc = acc;
            document.getElementById('edit-disp-input').value = disp;
            document.getElementById('modal-edit').style.display = 'flex';
        }
        function confirmEdit() {
            const d = document.getElementById('edit-disp-input').value.trim();
            friends = friends.map(f => f.acc === editingAcc ? {...f, disp: d || f.acc} : f);
            localStorage.setItem('rp_friends', JSON.stringify(friends));
            renderFriends();
            document.getElementById('modal-edit').style.display = 'none';
        }
        function deleteFriend() {
            friends = friends.filter(f => f.acc !== editingAcc);
            localStorage.setItem('rp_friends', JSON.stringify(friends));
            renderFriends();
            document.getElementById('modal-edit').style.display = 'none';
        }

        function openPointsModal(target, type) {
            activeTarget = target; activeType = type;
            document.getElementById('modal-points').style.display = 'flex';
        }
        async function submitPointsChange() {
            const amount = parseInt(document.getElementById('points-val').value);
            if (isNaN(amount) || amount < 1 || amount > 50) return;
            const targetId = activeTarget === 'me' ? myAcc : activeTarget;
            try {
                const snap = await db.ref('users/' + targetId).once('value');
                if (snap.exists()) {
                    let p = snap.val().points;
                    p = activeType === 'minus' ? (p - amount < 0 ? -1 : p - amount) : Math.min(100, p + amount);
                    await db.ref('users/' + targetId).update({ points: p });
                }
            } catch(e) { alert(translations[lang].errorDb); }
            document.getElementById('modal-points').style.display = 'none';
        }

        window.onclick = e => { if (e.target.className === 'overlay') e.target.style.display = 'none'; }
    </script>
</body>
</html>
